name: Deploy AI Worker

on:
  push:
    branches: ["main"]
    paths:
      - "apps/ai-worker/**"
      - ".github/workflows/deploy-ai-worker.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: pilo-ai-worker
  APP_PATH: apps/ai-worker

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_PATH }}
          push: true
          cache-from: type=gha,scope=ai-worker
          cache-to: type=gha,mode=max,scope=ai-worker
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy ECS service
        env:
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
          ECS_AI_WORKER_SERVICE: ${{ vars.ECS_AI_WORKER_SERVICE }}
          ECS_AGENT_WORKER_SERVICE: ${{ vars.ECS_AGENT_WORKER_SERVICE }}
          ECS_MEETING_WORKER_SERVICE: ${{ vars.ECS_MEETING_WORKER_SERVICE }}
          ECS_PR_REVIEW_AI_WORKER_SERVICE: ${{ vars.ECS_PR_REVIEW_AI_WORKER_SERVICE }}
          ECS_WORKSPACE_INDEXER_WORKER_SERVICE: ${{ vars.ECS_WORKSPACE_INDEXER_WORKER_SERVICE }}
        run: |
          test -n "$ECS_CLUSTER_NAME"
          test -n "$ECS_AI_WORKER_SERVICE"

          task_definition=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER_NAME" \
            --services "$ECS_AI_WORKER_SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)
          test -n "$task_definition"
          test "$task_definition" != "None"

          queue_url=$(aws ecs describe-task-definition \
            --task-definition "$task_definition" \
            --query 'taskDefinition.containerDefinitions[0].environment[?name==`SQS_AI_JOBS_QUEUE_URL`].value | [0]' \
            --output text)
          test -n "$queue_url"
          test "$queue_url" != "None"

          services=("$ECS_AI_WORKER_SERVICE")

          if [ -n "$ECS_AGENT_WORKER_SERVICE" ]; then
            agent_task_definition=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER_NAME" \
              --services "$ECS_AGENT_WORKER_SERVICE" \
              --query 'services[0].taskDefinition' \
              --output text)
            test -n "$agent_task_definition"
            test "$agent_task_definition" != "None"
            agent_queue_url=$(aws ecs describe-task-definition \
              --task-definition "$agent_task_definition" \
              --query 'taskDefinition.containerDefinitions[0].environment[?name==`SQS_AGENT_JOBS_QUEUE_URL`].value | [0]' \
              --output text)
            test -n "$agent_queue_url"
            test "$agent_queue_url" != "None"
            services+=("$ECS_AGENT_WORKER_SERVICE")
          fi

          if [ -n "$ECS_MEETING_WORKER_SERVICE" ]; then
            meeting_task_definition=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER_NAME" \
              --services "$ECS_MEETING_WORKER_SERVICE" \
              --query 'services[0].taskDefinition' \
              --output text)
            test -n "$meeting_task_definition"
            test "$meeting_task_definition" != "None"

            meeting_queue_url=$(aws ecs describe-task-definition \
              --task-definition "$meeting_task_definition" \
              --query 'taskDefinition.containerDefinitions[0].environment[?name==`SQS_MEETING_JOBS_QUEUE_URL`].value | [0]' \
              --output text)
            test -n "$meeting_queue_url"
            test "$meeting_queue_url" != "None"

            services+=("$ECS_MEETING_WORKER_SERVICE")
          fi

          if [ -n "$ECS_PR_REVIEW_AI_WORKER_SERVICE" ]; then
            pr_review_task_definition=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER_NAME" \
              --services "$ECS_PR_REVIEW_AI_WORKER_SERVICE" \
              --query 'services[0].taskDefinition' \
              --output text)
            test -n "$pr_review_task_definition"
            test "$pr_review_task_definition" != "None"

            pr_review_queue_url=$(aws ecs describe-task-definition \
              --task-definition "$pr_review_task_definition" \
              --query 'taskDefinition.containerDefinitions[0].environment[?name==`SQS_PR_REVIEW_ANALYSIS_QUEUE_URL`].value | [0]' \
              --output text)
            test -n "$pr_review_queue_url"
            test "$pr_review_queue_url" != "None"

            services+=("$ECS_PR_REVIEW_AI_WORKER_SERVICE")
          fi

          if [ -n "$ECS_WORKSPACE_INDEXER_WORKER_SERVICE" ]; then
            workspace_indexer_task_definition=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER_NAME" \
              --services "$ECS_WORKSPACE_INDEXER_WORKER_SERVICE" \
              --query 'services[0].taskDefinition' \
              --output text)
            test -n "$workspace_indexer_task_definition"
            test "$workspace_indexer_task_definition" != "None"

            workspace_indexing_queue_url=$(aws ecs describe-task-definition \
              --task-definition "$workspace_indexer_task_definition" \
              --query 'taskDefinition.containerDefinitions[0].environment[?name==`SQS_WORKSPACE_INDEXING_QUEUE_URL`].value | [0]' \
              --output text)
            test -n "$workspace_indexing_queue_url"
            test "$workspace_indexing_queue_url" != "None"

            services+=("$ECS_WORKSPACE_INDEXER_WORKER_SERVICE")
          fi

          for service in "${services[@]}"; do
            aws ecs update-service \
              --cluster "$ECS_CLUSTER_NAME" \
              --service "$service" \
              --force-new-deployment
          done

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER_NAME" \
            --services "${services[@]}"
