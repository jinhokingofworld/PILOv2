name: App CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  app-server:
    name: app-server
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pilo
          POSTGRES_PASSWORD: pilo
          POSTGRES_USER: pilo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pilo -d pilo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: pilo
          MYSQL_PASSWORD: pilo
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: pilo
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -upilo -ppilo --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://pilo:pilo@localhost:5432/pilo
      MYSQL_TEST_URL: mysql://pilo:pilo@localhost:3306/pilo
    defaults:
      run:
        working-directory: apps/app-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/app-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Export agent tool registry snapshot
        run: >-
          node scripts/agent/export-tool-retrieval-snapshot.mjs
          --output "$RUNNER_TEMP/agent-tool-registry-snapshot.json"

      - name: Upload agent tool registry snapshot
        uses: actions/upload-artifact@v4
        with:
          name: agent-tool-registry-snapshot
          path: ${{ runner.temp }}/agent-tool-registry-snapshot.json
          if-no-files-found: error

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  realtime-server:
    name: realtime-server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/realtime-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/realtime-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  ai-worker:
    name: ai-worker
    needs: app-server
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    defaults:
      run:
        working-directory: apps/ai-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download agent tool registry snapshot
        uses: actions/download-artifact@v4
        with:
          name: agent-tool-registry-snapshot
          path: ${{ runner.temp }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/ai-worker/requirements.txt
            apps/ai-worker/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Format check
        run: black --check app tests scripts

      - name: Lint
        run: ruff check app tests scripts

      - name: Test
        run: pytest

      - name: Tool retrieval quality gate
        run: >-
          python scripts/check_tool_retrieval_quality_gate.py
          --registry-snapshot "$RUNNER_TEMP/agent-tool-registry-snapshot.json"
          --output "$RUNNER_TEMP/agent-tool-retrieval-quality-gate.json"

      - name: Prompt injection security gate
        run: >-
          python scripts/check_prompt_injection_security_gate.py
          --output "$RUNNER_TEMP/agent-prompt-injection-security-gate.json"

      - name: Upload tool retrieval quality baseline
        uses: actions/upload-artifact@v4
        with:
          name: agent-tool-retrieval-quality-baseline
          path: ${{ runner.temp }}/agent-tool-retrieval-quality-gate.json
          if-no-files-found: error

      - name: Upload prompt injection security baseline
        uses: actions/upload-artifact@v4
        with:
          name: agent-prompt-injection-security-baseline
          path: ${{ runner.temp }}/agent-prompt-injection-security-gate.json
          if-no-files-found: error

      - name: Compile
        run: python -m compileall app
