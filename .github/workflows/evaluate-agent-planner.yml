name: Evaluate Agent Router and Planner

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Snapshot one main revision or compare baseline and candidate revisions
        required: true
        default: snapshot
        type: choice
        options:
          - snapshot
          - compare
      current_date:
        description: Fixed planner current date (YYYY-MM-DD)
        required: true
        default: "2026-07-08"
      repetitions:
        description: Number of attempts for every fixed evaluation case
        required: true
        default: "5"
        type: choice
        options:
          - "5"
          - "10"
      baseline_sha:
        description: Baseline commit SHA reachable from dev
        required: false
        type: string
      candidate_sha:
        description: Unmerged PR HEAD commit SHA descending from the baseline
        required: false
        type: string
      target_sha:
        description: Current main commit SHA; leave empty to use the dispatched main SHA
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2

jobs:
  prepare:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.revisions.outputs.target_sha }}
      baseline_sha: ${{ steps.revisions.outputs.baseline_sha }}
      candidate_sha: ${{ steps.revisions.outputs.candidate_sha }}
      targets: ${{ steps.revisions.outputs.targets }}
      variants: ${{ steps.revisions.outputs.variants }}

    steps:
      - name: Checkout snapshot evaluation source
        if: ${{ inputs.mode == 'snapshot' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_sha || github.sha }}
          path: target
          fetch-depth: 0

      - name: Checkout baseline evaluation source
        if: ${{ inputs.mode == 'compare' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.baseline_sha }}
          path: baseline
          fetch-depth: 0

      - name: Checkout candidate evaluation source
        if: ${{ inputs.mode == 'compare' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.candidate_sha }}
          path: candidate
          fetch-depth: 0

      - name: Resolve immutable evaluation revisions
        id: revisions
        env:
          MODE: ${{ inputs.mode }}
          TARGET_SHA: ${{ inputs.target_sha || github.sha }}
          BASELINE_SHA: ${{ inputs.baseline_sha }}
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
        run: |
          set -euo pipefail
          if [[ "$MODE" == "snapshot" ]]; then
            [[ "$TARGET_SHA" =~ ^[0-9a-f]{40}$ ]] || {
              echo "target SHA must be a lowercase 40-character commit SHA" >&2
              exit 1
            }
            [[ "$(git -C target rev-parse HEAD)" == "$TARGET_SHA" ]] || {
              echo "target checkout does not match the requested SHA" >&2
              exit 1
            }
            if [[ "$(git -C target rev-parse refs/remotes/origin/main)" != "$TARGET_SHA" ]]; then
              echo "target SHA must match the current main revision" >&2
              exit 1
            fi
            echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
            echo 'targets=["target"]' >> "$GITHUB_OUTPUT"
            echo 'variants=["multi_turn_context"]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$BASELINE_SHA" || -z "$CANDIDATE_SHA" ]]; then
            echo "compare mode requires baseline and candidate SHAs" >&2
            exit 1
          fi
          if [[ "$BASELINE_SHA" == "$CANDIDATE_SHA" ]]; then
            echo "baseline and candidate SHAs must be distinct" >&2
            exit 1
          fi
          for target in baseline candidate; do
            if [[ "$target" == "baseline" ]]; then
              sha="$BASELINE_SHA"
            else
              sha="$CANDIDATE_SHA"
            fi
            [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || {
              echo "$target SHA must be a lowercase 40-character commit SHA" >&2
              exit 1
            }
            [[ "$(git -C "$target" rev-parse HEAD)" == "$sha" ]] || {
              echo "$target checkout does not match the requested SHA" >&2
              exit 1
            }
          done
          if ! git -C baseline merge-base --is-ancestor \
            "$BASELINE_SHA" refs/remotes/origin/dev; then
            echo "baseline SHA is not reachable from dev" >&2
            exit 1
          fi
          if ! git -C candidate merge-base --is-ancestor \
            "$BASELINE_SHA" "$CANDIDATE_SHA"; then
            echo "candidate SHA does not descend from baseline SHA" >&2
            exit 1
          fi
          echo "baseline_sha=$BASELINE_SHA" >> "$GITHUB_OUTPUT"
          echo "candidate_sha=$CANDIDATE_SHA" >> "$GITHUB_OUTPUT"
          echo 'targets=["baseline","candidate"]' >> "$GITHUB_OUTPUT"
          echo 'variants=["multi_turn_context"]' >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build registry-bound evaluation inputs
        env:
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/prepared"
          if [[ "$MODE" == "snapshot" ]]; then
            targets=(target)
            catalog_source=target
          else
            targets=(baseline candidate)
            catalog_source=baseline
          fi
          for target in "${targets[@]}"; do
            cd "$GITHUB_WORKSPACE/$target/apps/app-server"
            npm ci
            npm run build
            node scripts/agent/export-tool-retrieval-snapshot.mjs \
              --output "$RUNNER_TEMP/prepared/$target-agent-tool-registry-snapshot.json"

            cd "$GITHUB_WORKSPACE/$target/apps/ai-worker"
            PYTHONPATH=. python scripts/export_phase4e_evaluation_inputs.py \
              --registry-snapshot "$RUNNER_TEMP/prepared/$target-agent-tool-registry-snapshot.json" \
              --tool-snapshot-output "$RUNNER_TEMP/prepared/$target-phase4e-evaluation-tools.json" \
              --catalog-output "$RUNNER_TEMP/prepared/$target-phase4e-tool-capability-catalog.json"
          done
          cp \
            "$GITHUB_WORKSPACE/$catalog_source/apps/ai-worker/evals/meeting_agent_capability_catalog_v1.json" \
            "$RUNNER_TEMP/prepared/meeting-agent-capability-catalog.json"
          cp \
            "$GITHUB_WORKSPACE/$catalog_source/apps/ai-worker/evals/agent_multiturn_context_v1.json" \
            "$RUNNER_TEMP/prepared/agent-multiturn-context-catalog.json"

      - name: Run candidate Meeting write E2E
        if: ${{ inputs.mode == 'compare' }}
        working-directory: candidate/apps/app-server
        run: |
          node scripts/agent/phase4e-meeting-readiness.mjs \
            --registry-snapshot "$RUNNER_TEMP/prepared/candidate-agent-tool-registry-snapshot.json" \
            --output "$RUNNER_TEMP/prepared/phase4e-meeting-runtime-readiness.json"

      - name: Upload prepared evaluation inputs
        uses: actions/upload-artifact@v4
        with:
          name: agent-router-planner-prepared-inputs
          path: ${{ runner.temp }}/prepared
          if-no-files-found: error
          retention-days: 1

  evaluate:
    name: Evaluate ${{ matrix.target }} / ${{ matrix.variant }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
        variant: ${{ fromJSON(needs.prepare.outputs.variants) }}

    steps:
      - name: Checkout evaluation source
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.target == 'target' && needs.prepare.outputs.target_sha || matrix.target == 'baseline' && needs.prepare.outputs.baseline_sha || needs.prepare.outputs.candidate_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Planner evaluation dependencies
        run: python -m pip install -r apps/ai-worker/requirements.txt

      - name: Download prepared evaluation inputs
        uses: actions/download-artifact@v4
        with:
          name: agent-router-planner-prepared-inputs
          path: ${{ runner.temp }}/prepared

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run two-stage LLM evaluation shard
        working-directory: apps/ai-worker
        env:
          CURRENT_DATE: ${{ inputs.current_date }}
          REPETITIONS: ${{ inputs.repetitions }}
          TARGET: ${{ matrix.target }}
          VARIANT: ${{ matrix.variant }}
        run: |
          set -euo pipefail

          export OPENAI_API_KEY="$(aws secretsmanager get-secret-value \
            --secret-id pilo-dev/ai-worker/OPENAI_API_KEY \
            --query SecretString \
            --output text)"
          PYTHONPATH=. python scripts/evaluate_agent_planner.py \
            --suite "$RUNNER_TEMP/prepared/$TARGET-phase4e-evaluation-tools.json" \
            --meeting-catalog "$RUNNER_TEMP/prepared/meeting-agent-capability-catalog.json" \
            --multiturn-catalog "$RUNNER_TEMP/prepared/agent-multiturn-context-catalog.json" \
            --meeting-variant "$VARIANT" \
            --tool-capability-catalog "$RUNNER_TEMP/prepared/$TARGET-phase4e-tool-capability-catalog.json" \
            --registry-snapshot "$RUNNER_TEMP/prepared/$TARGET-agent-tool-registry-snapshot.json" \
            --llm-routing \
            --retrieval-top-k 8 \
            --seed 17 \
            --current-date "$CURRENT_DATE" \
            --timezone Asia/Seoul \
            --model gpt-5.4-mini \
            --router-model gpt-5.4-mini \
            --repetitions "$REPETITIONS" \
            --output "$RUNNER_TEMP/$TARGET-meeting-${VARIANT}-evaluation.json"
          unset OPENAI_API_KEY

      - name: Upload evaluation shard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-evaluation-${{ matrix.target }}-${{ matrix.variant }}
          path: ${{ runner.temp }}/${{ matrix.target }}-meeting-${{ matrix.variant }}-evaluation.json
          if-no-files-found: error
          retention-days: 1

  compare:
    if: ${{ always() && inputs.mode == 'compare' && needs.prepare.result == 'success' }}
    needs:
      - prepare
      - evaluate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout baseline evaluation source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.baseline_sha }}
          path: baseline

      - name: Checkout candidate evaluation source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.candidate_sha }}
          path: candidate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install evaluation gate dependencies
        run: |
          python -m pip install \
            -r baseline/apps/ai-worker/requirements.txt \
            -r candidate/apps/ai-worker/requirements.txt

      - name: Download prepared evaluation inputs
        uses: actions/download-artifact@v4
        with:
          name: agent-router-planner-prepared-inputs
          path: ${{ runner.temp }}/prepared

      - name: Download evaluation shards
        uses: actions/download-artifact@v4
        with:
          pattern: agent-evaluation-*
          path: ${{ runner.temp }}/evaluation-results
          merge-multiple: true

      - name: Compare baseline and candidate multi-turn results
        working-directory: baseline/apps/ai-worker
        run: |
          PYTHONPATH=. python scripts/compare_agent_planner_evaluations.py \
            --baseline-report "$RUNNER_TEMP/evaluation-results/baseline-meeting-multi_turn_context-evaluation.json" \
            --candidate-report "$RUNNER_TEMP/evaluation-results/candidate-meeting-multi_turn_context-evaluation.json" \
            --output "$RUNNER_TEMP/agent-router-planner-comparison.json"

      - name: Run deterministic supporting gates
        working-directory: candidate/apps/ai-worker
        run: |
          PYTHONPATH=. python scripts/check_tool_retrieval_quality_gate.py \
            --registry-snapshot "$RUNNER_TEMP/prepared/candidate-agent-tool-registry-snapshot.json" \
            --output "$RUNNER_TEMP/agent-tool-retrieval-quality-gate.json"
          PYTHONPATH=. python scripts/check_prompt_injection_security_gate.py \
            --output "$RUNNER_TEMP/agent-prompt-injection-security-gate.json"

      - name: Upload evaluation result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-multiturn-context-${{ inputs.current_date }}
          path: |
            ${{ runner.temp }}/evaluation-results/baseline-meeting-*-evaluation.json
            ${{ runner.temp }}/evaluation-results/candidate-meeting-*-evaluation.json
            ${{ runner.temp }}/agent-router-planner-comparison.json
          if-no-files-found: error
          retention-days: 30

  snapshot:
    if: ${{ always() && inputs.mode == 'snapshot' && needs.prepare.result == 'success' }}
    needs:
      - prepare
      - evaluate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout snapshot evaluation source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
          path: target

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download multi-turn evaluation shard
        uses: actions/download-artifact@v4
        with:
          name: agent-evaluation-target-multi_turn_context
          path: ${{ runner.temp }}/evaluation-results

      - name: Build absolute performance snapshot
        working-directory: target/apps/ai-worker
        run: |
          PYTHONPATH=. python scripts/snapshot_agent_planner_evaluations.py \
            --report "$RUNNER_TEMP/evaluation-results/target-meeting-multi_turn_context-evaluation.json" \
            --output "$RUNNER_TEMP/agent-performance-snapshot.json"

      - name: Upload performance snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-performance-snapshot-${{ needs.prepare.outputs.target_sha }}
          path: |
            ${{ runner.temp }}/evaluation-results/target-meeting-multi_turn_context-evaluation.json
            ${{ runner.temp }}/agent-performance-snapshot.json
          if-no-files-found: error
          retention-days: 30
