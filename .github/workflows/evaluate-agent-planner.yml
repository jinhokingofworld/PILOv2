name: Evaluate Agent Router and Planner

on:
  workflow_dispatch:
    inputs:
      current_date:
        description: Fixed planner current date (YYYY-MM-DD)
        required: true
        default: "2026-07-08"
      repetitions:
        description: Number of attempts for every fixed evaluation case
        required: true
        default: "5"
        type: choice
        options:
          - "5"
          - "10"
      baseline_ref:
        description: Trusted baseline source
        required: true
        default: main
        type: choice
        options:
          - main
          - dev
      candidate_ref:
        description: Trusted candidate source
        required: true
        default: dev
        type: choice
        options:
          - dev
          - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2

jobs:
  evaluate:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout baseline evaluation source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.baseline_ref }}
          path: baseline

      - name: Checkout candidate evaluation source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.candidate_ref }}
          path: candidate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            baseline/apps/app-server/package-lock.json
            candidate/apps/app-server/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build registry-bound inputs for baseline and candidate
        run: |
          set -euo pipefail
          for target in baseline candidate; do
            cd "$GITHUB_WORKSPACE/$target/apps/app-server"
            npm ci
            npm run build
            node scripts/agent/export-tool-retrieval-snapshot.mjs \
              --output "$RUNNER_TEMP/$target-agent-tool-registry-snapshot.json"

            cd "$GITHUB_WORKSPACE/$target/apps/ai-worker"
            PYTHONPATH=. python scripts/export_phase4e_evaluation_inputs.py \
              --registry-snapshot "$RUNNER_TEMP/$target-agent-tool-registry-snapshot.json" \
              --tool-snapshot-output "$RUNNER_TEMP/$target-phase4e-evaluation-tools.json" \
              --catalog-output "$RUNNER_TEMP/$target-phase4e-tool-capability-catalog.json"
          done

      - name: Run candidate Meeting write E2E
        working-directory: candidate/apps/app-server
        run: |
          node scripts/agent/phase4e-meeting-readiness.mjs \
            --registry-snapshot "$RUNNER_TEMP/candidate-agent-tool-registry-snapshot.json" \
            --output "$RUNNER_TEMP/phase4e-meeting-runtime-readiness.json"

      - name: Install Planner evaluation dependencies
        run: |
          python -m pip install \
            -r baseline/apps/ai-worker/requirements.txt \
            -r candidate/apps/ai-worker/requirements.txt

      - name: Run paired two-stage LLM evaluations
        env:
          CURRENT_DATE: ${{ inputs.current_date }}
          REPETITIONS: ${{ inputs.repetitions }}
        run: |
          set -euo pipefail

          export OPENAI_API_KEY="$(aws secretsmanager get-secret-value \
            --secret-id pilo-dev/ai-worker/OPENAI_API_KEY \
            --query SecretString \
            --output text)"
          for target in baseline candidate; do
            cd "$GITHUB_WORKSPACE/$target/apps/ai-worker"
            for variant in canonical held_out counterexample context; do
              PYTHONPATH=. python scripts/evaluate_agent_planner.py \
                --suite "$RUNNER_TEMP/$target-phase4e-evaluation-tools.json" \
                --meeting-catalog "$GITHUB_WORKSPACE/baseline/apps/ai-worker/evals/meeting_agent_capability_catalog_v1.json" \
                --meeting-variant "$variant" \
                --tool-capability-catalog "$RUNNER_TEMP/$target-phase4e-tool-capability-catalog.json" \
                --registry-snapshot "$RUNNER_TEMP/$target-agent-tool-registry-snapshot.json" \
                --llm-routing \
                --retrieval-top-k 8 \
                --seed 17 \
                --current-date "$CURRENT_DATE" \
                --timezone Asia/Seoul \
                --model gpt-5.4-mini \
                --router-model gpt-5.4-mini \
                --repetitions "$REPETITIONS" \
                --output "$RUNNER_TEMP/$target-meeting-${variant}-evaluation.json"
            done
          done
          unset OPENAI_API_KEY

      - name: Compare baseline and candidate funnels
        working-directory: baseline/apps/ai-worker
        run: |
          PYTHONPATH=. python scripts/compare_agent_planner_evaluations.py \
            --baseline-report "$RUNNER_TEMP/baseline-meeting-canonical-evaluation.json" \
            --baseline-report "$RUNNER_TEMP/baseline-meeting-held_out-evaluation.json" \
            --baseline-report "$RUNNER_TEMP/baseline-meeting-counterexample-evaluation.json" \
            --baseline-report "$RUNNER_TEMP/baseline-meeting-context-evaluation.json" \
            --candidate-report "$RUNNER_TEMP/candidate-meeting-canonical-evaluation.json" \
            --candidate-report "$RUNNER_TEMP/candidate-meeting-held_out-evaluation.json" \
            --candidate-report "$RUNNER_TEMP/candidate-meeting-counterexample-evaluation.json" \
            --candidate-report "$RUNNER_TEMP/candidate-meeting-context-evaluation.json" \
            --output "$RUNNER_TEMP/agent-router-planner-comparison.json"

      - name: Run deterministic supporting gates
        working-directory: candidate/apps/ai-worker
        run: |
          PYTHONPATH=. python scripts/check_tool_retrieval_quality_gate.py \
            --registry-snapshot "$RUNNER_TEMP/candidate-agent-tool-registry-snapshot.json" \
            --output "$RUNNER_TEMP/agent-tool-retrieval-quality-gate.json"
          PYTHONPATH=. python scripts/check_prompt_injection_security_gate.py \
            --output "$RUNNER_TEMP/agent-prompt-injection-security-gate.json"

      - name: Enforce Phase 4-E dev release gate
        working-directory: candidate/apps/ai-worker
        run: |
          PYTHONPATH=. python scripts/check_phase4e_dev_readiness.py \
            --registry-snapshot "$RUNNER_TEMP/candidate-agent-tool-registry-snapshot.json" \
            --tool-retrieval-report "$RUNNER_TEMP/agent-tool-retrieval-quality-gate.json" \
            --prompt-security-report "$RUNNER_TEMP/agent-prompt-injection-security-gate.json" \
            --app-server-report "$RUNNER_TEMP/phase4e-meeting-runtime-readiness.json" \
            --meeting-catalog "$GITHUB_WORKSPACE/baseline/apps/ai-worker/evals/meeting_agent_capability_catalog_v1.json" \
            --meeting-evaluation-report "$RUNNER_TEMP/candidate-meeting-canonical-evaluation.json" \
            --meeting-evaluation-report "$RUNNER_TEMP/candidate-meeting-held_out-evaluation.json" \
            --meeting-evaluation-report "$RUNNER_TEMP/candidate-meeting-counterexample-evaluation.json" \
            --meeting-evaluation-report "$RUNNER_TEMP/candidate-meeting-context-evaluation.json" \
            --dev-terraform ../../infra/envs/dev/main.tf \
            --rollout-runbook ../../docs/infra/agent-tool-retrieval-dev-rollout.md \
            --output "$RUNNER_TEMP/phase4e-dev-readiness.json"

      - name: Upload evaluation result
        uses: actions/upload-artifact@v4
        with:
          name: phase4e-dev-readiness-${{ inputs.current_date }}
          path: |
            ${{ runner.temp }}/baseline-meeting-*-evaluation.json
            ${{ runner.temp }}/candidate-meeting-*-evaluation.json
            ${{ runner.temp }}/agent-router-planner-comparison.json
            ${{ runner.temp }}/phase4e-meeting-runtime-readiness.json
            ${{ runner.temp }}/phase4e-dev-readiness.json
          if-no-files-found: error
          retention-days: 30
