name: Evaluate Agent Router and Planner

on:
  workflow_dispatch:
    inputs:
      current_date:
        description: Fixed planner current date (YYYY-MM-DD)
        required: true
        default: "2026-07-08"
      repetitions:
        description: Number of attempts for every fixed evaluation case
        required: true
        default: "5"
        type: choice
        options:
          - "5"
          - "10"
      baseline_sha:
        description: Baseline commit SHA reachable from dev
        required: true
        type: string
      candidate_sha:
        description: Unmerged PR HEAD commit SHA descending from the baseline
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2

jobs:
  prepare:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    outputs:
      baseline_sha: ${{ steps.revisions.outputs.baseline_sha }}
      candidate_sha: ${{ steps.revisions.outputs.candidate_sha }}

    steps:
      - name: Checkout baseline evaluation source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.baseline_sha }}
          path: baseline
          fetch-depth: 0

      - name: Checkout candidate evaluation source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.candidate_sha }}
          path: candidate
          fetch-depth: 0

      - name: Resolve immutable evaluation revisions
        id: revisions
        env:
          BASELINE_SHA: ${{ inputs.baseline_sha }}
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
        run: |
          set -euo pipefail
          if [[ "$BASELINE_SHA" == "$CANDIDATE_SHA" ]]; then
            echo "baseline and candidate SHAs must be distinct" >&2
            exit 1
          fi
          for target in baseline candidate; do
            if [[ "$target" == "baseline" ]]; then
              sha="$BASELINE_SHA"
            else
              sha="$CANDIDATE_SHA"
            fi
            [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || {
              echo "$target SHA must be a lowercase 40-character commit SHA" >&2
              exit 1
            }
            [[ "$(git -C "$target" rev-parse HEAD)" == "$sha" ]] || {
              echo "$target checkout does not match the requested SHA" >&2
              exit 1
            }
          done
          if ! git -C baseline merge-base --is-ancestor \
            "$BASELINE_SHA" refs/remotes/origin/dev; then
            echo "baseline SHA is not reachable from dev" >&2
            exit 1
          fi
          if ! git -C candidate merge-base --is-ancestor \
            "$BASELINE_SHA" "$CANDIDATE_SHA"; then
            echo "candidate SHA does not descend from baseline SHA" >&2
            exit 1
          fi
          echo "baseline_sha=$BASELINE_SHA" >> "$GITHUB_OUTPUT"
          echo "candidate_sha=$CANDIDATE_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            baseline/apps/app-server/package-lock.json
            candidate/apps/app-server/package-lock.json

      - name: Build registry-bound inputs for baseline and candidate
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/prepared"
          for target in baseline candidate; do
            cd "$GITHUB_WORKSPACE/$target/apps/app-server"
            npm ci
            npm run build
            node scripts/agent/export-tool-retrieval-snapshot.mjs \
              --output "$RUNNER_TEMP/prepared/$target-agent-tool-registry-snapshot.json"

            cd "$GITHUB_WORKSPACE/$target/apps/ai-worker"
            PYTHONPATH=. python scripts/export_phase4e_evaluation_inputs.py \
              --registry-snapshot "$RUNNER_TEMP/prepared/$target-agent-tool-registry-snapshot.json" \
              --tool-snapshot-output "$RUNNER_TEMP/prepared/$target-phase4e-evaluation-tools.json" \
              --catalog-output "$RUNNER_TEMP/prepared/$target-phase4e-tool-capability-catalog.json"
          done
          cp \
            "$GITHUB_WORKSPACE/baseline/apps/ai-worker/evals/meeting_agent_capability_catalog_v1.json" \
            "$RUNNER_TEMP/prepared/meeting-agent-capability-catalog.json"
          cp \
            "$GITHUB_WORKSPACE/baseline/apps/ai-worker/evals/agent_workflow_catalog_v1.json" \
            "$RUNNER_TEMP/prepared/agent-workflow-catalog.json"

      - name: Run candidate Meeting write E2E
        working-directory: candidate/apps/app-server
        run: |
          node scripts/agent/phase4e-meeting-readiness.mjs \
            --registry-snapshot "$RUNNER_TEMP/prepared/candidate-agent-tool-registry-snapshot.json" \
            --output "$RUNNER_TEMP/prepared/phase4e-meeting-runtime-readiness.json"

      - name: Upload prepared evaluation inputs
        uses: actions/upload-artifact@v4
        with:
          name: agent-router-planner-prepared-inputs
          path: ${{ runner.temp }}/prepared
          if-no-files-found: error
          retention-days: 1

  evaluate:
    name: Evaluate ${{ matrix.target }} / ${{ matrix.variant }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        target:
          - baseline
          - candidate
        variant:
          - canonical
          - held_out
          - counterexample
          - context
          - multi_tool
          - agent_workflow

    steps:
      - name: Checkout evaluation source
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.target == 'baseline' && needs.prepare.outputs.baseline_sha || needs.prepare.outputs.candidate_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Planner evaluation dependencies
        run: python -m pip install -r apps/ai-worker/requirements.txt

      - name: Download prepared evaluation inputs
        uses: actions/download-artifact@v4
        with:
          name: agent-router-planner-prepared-inputs
          path: ${{ runner.temp }}/prepared

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run two-stage LLM evaluation shard
        working-directory: apps/ai-worker
        env:
          CURRENT_DATE: ${{ inputs.current_date }}
          REPETITIONS: ${{ inputs.repetitions }}
          TARGET: ${{ matrix.target }}
          VARIANT: ${{ matrix.variant }}
        run: |
          set -euo pipefail

          export OPENAI_API_KEY="$(aws secretsmanager get-secret-value \
            --secret-id pilo-dev/ai-worker/OPENAI_API_KEY \
            --query SecretString \
            --output text)"
          PYTHONPATH=. python scripts/evaluate_agent_planner.py \
            --suite "$RUNNER_TEMP/prepared/$TARGET-phase4e-evaluation-tools.json" \
            --meeting-catalog "$RUNNER_TEMP/prepared/meeting-agent-capability-catalog.json" \
            --workflow-catalog "$RUNNER_TEMP/prepared/agent-workflow-catalog.json" \
            --meeting-variant "$VARIANT" \
            --tool-capability-catalog "$RUNNER_TEMP/prepared/$TARGET-phase4e-tool-capability-catalog.json" \
            --registry-snapshot "$RUNNER_TEMP/prepared/$TARGET-agent-tool-registry-snapshot.json" \
            --llm-routing \
            --retrieval-top-k 8 \
            --seed 17 \
            --current-date "$CURRENT_DATE" \
            --timezone Asia/Seoul \
            --model gpt-5.4-mini \
            --router-model gpt-5.4-mini \
            --repetitions "$REPETITIONS" \
            --output "$RUNNER_TEMP/$TARGET-meeting-${VARIANT}-evaluation.json"
          unset OPENAI_API_KEY

      - name: Upload evaluation shard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-evaluation-${{ matrix.target }}-${{ matrix.variant }}
          path: ${{ runner.temp }}/${{ matrix.target }}-meeting-${{ matrix.variant }}-evaluation.json
          if-no-files-found: error
          retention-days: 1

  compare:
    if: ${{ always() && needs.prepare.result == 'success' }}
    needs:
      - prepare
      - evaluate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout baseline evaluation source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.baseline_sha }}
          path: baseline

      - name: Checkout candidate evaluation source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.candidate_sha }}
          path: candidate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install evaluation gate dependencies
        run: |
          python -m pip install \
            -r baseline/apps/ai-worker/requirements.txt \
            -r candidate/apps/ai-worker/requirements.txt

      - name: Download prepared evaluation inputs
        uses: actions/download-artifact@v4
        with:
          name: agent-router-planner-prepared-inputs
          path: ${{ runner.temp }}/prepared

      - name: Download evaluation shards
        uses: actions/download-artifact@v4
        with:
          pattern: agent-evaluation-*
          path: ${{ runner.temp }}/evaluation-results
          merge-multiple: true

      - name: Compare baseline and candidate funnels
        working-directory: baseline/apps/ai-worker
        run: |
          PYTHONPATH=. python scripts/compare_agent_planner_evaluations.py \
            --baseline-report "$RUNNER_TEMP/evaluation-results/baseline-meeting-canonical-evaluation.json" \
            --baseline-report "$RUNNER_TEMP/evaluation-results/baseline-meeting-held_out-evaluation.json" \
            --baseline-report "$RUNNER_TEMP/evaluation-results/baseline-meeting-counterexample-evaluation.json" \
            --baseline-report "$RUNNER_TEMP/evaluation-results/baseline-meeting-context-evaluation.json" \
            --baseline-report "$RUNNER_TEMP/evaluation-results/baseline-meeting-multi_tool-evaluation.json" \
            --baseline-report "$RUNNER_TEMP/evaluation-results/baseline-meeting-agent_workflow-evaluation.json" \
            --candidate-report "$RUNNER_TEMP/evaluation-results/candidate-meeting-canonical-evaluation.json" \
            --candidate-report "$RUNNER_TEMP/evaluation-results/candidate-meeting-held_out-evaluation.json" \
            --candidate-report "$RUNNER_TEMP/evaluation-results/candidate-meeting-counterexample-evaluation.json" \
            --candidate-report "$RUNNER_TEMP/evaluation-results/candidate-meeting-context-evaluation.json" \
            --candidate-report "$RUNNER_TEMP/evaluation-results/candidate-meeting-multi_tool-evaluation.json" \
            --candidate-report "$RUNNER_TEMP/evaluation-results/candidate-meeting-agent_workflow-evaluation.json" \
            --output "$RUNNER_TEMP/agent-router-planner-comparison.json"

      - name: Run deterministic supporting gates
        working-directory: candidate/apps/ai-worker
        run: |
          PYTHONPATH=. python scripts/check_tool_retrieval_quality_gate.py \
            --registry-snapshot "$RUNNER_TEMP/prepared/candidate-agent-tool-registry-snapshot.json" \
            --output "$RUNNER_TEMP/agent-tool-retrieval-quality-gate.json"
          PYTHONPATH=. python scripts/check_prompt_injection_security_gate.py \
            --output "$RUNNER_TEMP/agent-prompt-injection-security-gate.json"

      - name: Enforce Phase 4-E dev release gate
        working-directory: candidate/apps/ai-worker
        run: |
          PYTHONPATH=. python scripts/check_phase4e_dev_readiness.py \
            --registry-snapshot "$RUNNER_TEMP/prepared/candidate-agent-tool-registry-snapshot.json" \
            --tool-retrieval-report "$RUNNER_TEMP/agent-tool-retrieval-quality-gate.json" \
            --prompt-security-report "$RUNNER_TEMP/agent-prompt-injection-security-gate.json" \
            --app-server-report "$RUNNER_TEMP/prepared/phase4e-meeting-runtime-readiness.json" \
            --meeting-catalog "$RUNNER_TEMP/prepared/meeting-agent-capability-catalog.json" \
            --meeting-evaluation-report "$RUNNER_TEMP/evaluation-results/candidate-meeting-canonical-evaluation.json" \
            --meeting-evaluation-report "$RUNNER_TEMP/evaluation-results/candidate-meeting-held_out-evaluation.json" \
            --meeting-evaluation-report "$RUNNER_TEMP/evaluation-results/candidate-meeting-counterexample-evaluation.json" \
            --meeting-evaluation-report "$RUNNER_TEMP/evaluation-results/candidate-meeting-context-evaluation.json" \
            --meeting-evaluation-report "$RUNNER_TEMP/evaluation-results/candidate-meeting-multi_tool-evaluation.json" \
            --dev-terraform ../../infra/envs/dev/main.tf \
            --rollout-runbook ../../docs/infra/agent-tool-retrieval-dev-rollout.md \
            --output "$RUNNER_TEMP/phase4e-dev-readiness.json"

      - name: Upload evaluation result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase4e-dev-readiness-${{ inputs.current_date }}
          path: |
            ${{ runner.temp }}/evaluation-results/baseline-meeting-*-evaluation.json
            ${{ runner.temp }}/evaluation-results/candidate-meeting-*-evaluation.json
            ${{ runner.temp }}/agent-router-planner-comparison.json
            ${{ runner.temp }}/prepared/phase4e-meeting-runtime-readiness.json
            ${{ runner.temp }}/phase4e-dev-readiness.json
          if-no-files-found: error
          retention-days: 30
