name: Deploy Frontend

on:
  push:
    branches: ["main"]
    paths:
      - "apps/frontend/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  APP_PATH: apps/frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ env.APP_PATH }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.APP_PATH }}
        run: npm ci

      - name: Check frontend API origin
        env:
          NEXT_PUBLIC_PILO_APP_SERVER_URL: ${{ vars.NEXT_PUBLIC_PILO_APP_SERVER_URL }}
        run: test -n "$NEXT_PUBLIC_PILO_APP_SERVER_URL"

      - name: Build static frontend
        working-directory: ${{ env.APP_PATH }}
        env:
          NEXT_PUBLIC_PILO_APP_SERVER_URL: ${{ vars.NEXT_PUBLIC_PILO_APP_SERVER_URL }}
          NEXT_PUBLIC_TLDRAW_LICENSE_KEY: ${{ vars.NEXT_PUBLIC_TLDRAW_LICENSE_KEY }}
        run: npm run build

      - name: Upload to S3
        run: |
          aws s3 sync "${{ env.APP_PATH }}/out" "s3://${{ vars.FRONTEND_S3_BUCKET }}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
