name: Deploy App Server

on:
  push:
    branches: ["main"]
    paths:
      - "apps/app-server/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: pilo-app-server
  ECS_SERVICE_KEY: app-server
  APP_PATH: apps/app-server

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_PATH }}
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy ECS services
        env:
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
          ECS_APP_SERVER_SERVICE: ${{ vars.ECS_APP_SERVER_SERVICE }}
          ECS_GITHUB_SYNC_WORKER_SERVICE: ${{ vars.ECS_GITHUB_SYNC_WORKER_SERVICE }}
        run: |
          set -euo pipefail

          services=("$ECS_APP_SERVER_SERVICE")
          if [[ -n "${ECS_GITHUB_SYNC_WORKER_SERVICE:-}" ]]; then
            if worker_service_name="$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER_NAME" \
              --services "$ECS_GITHUB_SYNC_WORKER_SERVICE" \
              --query 'services[0].serviceName' \
              --output text)"; then
              if [[ "$worker_service_name" == "$ECS_GITHUB_SYNC_WORKER_SERVICE" ]]; then
                services+=("$ECS_GITHUB_SYNC_WORKER_SERVICE")
              else
                echo "GitHub sync worker service does not exist yet; skipping worker deployment."
              fi
            else
              echo "Unable to verify GitHub sync worker service." >&2
              exit 1
            fi
          fi

          for service in "${services[@]}"; do
            aws ecs update-service \
              --cluster "$ECS_CLUSTER_NAME" \
              --service "$service" \
              --force-new-deployment
          done

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER_NAME" \
            --services "${services[@]}"
